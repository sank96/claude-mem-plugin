name: Bug report
description: Report a defect in an installer, adapter, or runtime path
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce the problem.
  - type: input
    id: cli
    attributes:
      label: Target CLI
      description: Which client were you installing or using?
      placeholder: Codex / Claude Code / Copilot CLI
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: Which OS and version are you using?
      placeholder: Windows 11 / macOS 15 / Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command used
      placeholder: npm run install:codex
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or config snippets
      description: Paste any relevant terminal output or config excerpts
