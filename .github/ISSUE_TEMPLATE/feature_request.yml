name: Feature request
description: Suggest an improvement to installers, adapters, packaging, or docs
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the user problem first, then the proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or limitation are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: input
    id: target
    attributes:
      label: Target area
      description: Which area does this affect?
      placeholder: Codex / Claude Code / Copilot CLI / Docs / Packaging
